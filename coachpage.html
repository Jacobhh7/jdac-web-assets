<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><base target="_top"><style>html,body{margin:0;background:#f4f3ee}</style></head>
<body><jdac-coachpage></jdac-coachpage><script src="./jdac-coachpage.js"></script>
<script>/* best-effort：把內容高度回報給外層（Wix 若不收也無害）*/
(function(){function h(){try{var d=document.documentElement,b=document.body;var H=Math.max(d.scrollHeight,b.scrollHeight,d.offsetHeight,b.offsetHeight);parent.postMessage({jdacHeight:H},'*');}catch(e){}}
window.addEventListener('load',h);setInterval(h,1200);})();</script>
</body></html>
